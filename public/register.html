<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — SAFpedia</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="../user/styles/user.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">Create your SAFpedia account</h1>

      <form id="registerForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="fullName">Full Name</label>
          <input class="form-input" type="text" id="fullName" name="fullName" required />
          <span class="form-error" id="fullNameError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required />
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone</label>
          <input class="form-input" type="tel" id="phone" name="phone" required />
          <span class="form-error" id="phoneError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" required />
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirmPassword">Confirm Password</label>
          <input class="form-input" type="password" id="confirmPassword" name="confirmPassword" required />
          <span class="form-error" id="confirmPasswordError"></span>
        </div>

        <div class="form-group">
          <span class="form-error" id="formError"></span>
        </div>

        <button type="submit" class="btn btn-primary" id="registerSubmit">Create Account</button>
      </form>

      <div id="registerSuccess" style="display:none; text-align:center;">
        <span class="material-icons" style="font-size:40px; color: var(--color-secondary);">mail</span>
        <p style="font: 600 15px var(--font-body); color: var(--color-text); margin: 12px 0 4px 0;">
          Verify your email to continue
        </p>
        <p style="font: 400 13px var(--font-body); color: var(--color-text-muted); margin: 0 0 20px 0;">
          We've sent a verification link to your email address. Please verify before logging in.
        </p>
        <a class="btn btn-secondary" href="./login.html">Go to Log In</a>
      </div>

      <p class="auth-alt-action">
        Already have an account? <a href="./login.html">Log in</a>
      </p>
    </section>
  </main>

  <script type="module" src="../user/scripts/userAuth.js"></script>
</body>
</html>
