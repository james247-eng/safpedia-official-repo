<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — SAFpedia</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

  <!-- Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <link rel="stylesheet" href="../user/styles/user.css" />
</head>
<body>

  <main class="auth-page">
    <section class="auth-card">
      <h1 class="auth-title">Log in to SAFpedia</h1>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" id="email" name="email" required />
          <span class="form-error" id="emailError"></span>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" name="password" required />
          <span class="form-error" id="passwordError"></span>
        </div>

        <div class="form-group">
          <span class="form-error" id="formError"></span>
          <a href="#" id="resendVerificationLink" style="display:none; font-size:12px; color: var(--color-secondary);">
            Resend verification email
          </a>
        </div>

        <button type="submit" class="btn btn-primary" id="loginSubmit">Log In</button>
      </form>

      <p class="auth-alt-action">
        <a href="./resetPassword.html">Forgot password?</a>
      </p>
      <p class="auth-alt-action">
        Don't have an account? <a href="./register.html">Create one</a>
      </p>
    </section>
  </main>

  <script type="module" src="../user/scripts/userAuth.js"></script>
</body>
</html>
